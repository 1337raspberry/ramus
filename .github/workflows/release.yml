name: Release

# Builds ramus for macOS (Apple Silicon + Intel), Linux, Windows, Android,
# and iOS. Uploads the installers to a draft GitHub Release. Trigger by
# pushing a `v*` tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) or
# by running the workflow manually from the Actions tab.
#
# libmpv is loaded at runtime via libloading (see ramus-tauri/src/mpv_ffi.rs),
# so the build machine only needs libmpv present for the brew/apt dev
# loop on mac/linux. On Windows there is no pkg-config / libmpv-dev
# package to install — we download the zhongfly LGPL prebuilt DLL and
# let Tauri bundle it as a resource so it ends up alongside ramus.exe.
# Android uses Media3/ExoPlayer (not libmpv); iOS uses MPVKit via SPM
# (resolved by Xcode), so neither needs a separate libmpv bundling step.
#
# REQUIRED SECRETS for Android signing — set once in repo Settings →
# Secrets and variables → Actions:
#   ANDROID_KEYSTORE_BASE64    base64-encoded contents of release.keystore
#                              (`base64 -i ramus-tauri/gen/android/app/release.keystore`).
#   ANDROID_KEYSTORE_PASSWORD  store password ("ramusdev" for the local dev keystore).
#   ANDROID_KEY_ALIAS          key alias ("ramus").
#   ANDROID_KEY_PASSWORD       key password ("ramusdev").
# The Android matrix entry won't sign correctly without these.
#
# iOS NEEDS NO SECRETS. The .ipa is ad-hoc signed (CODE_SIGN_IDENTITY="-")
# with no provisioning profile. The resulting build is NOT installable on
# a real device directly — it is intended to be re-signed by SideStore /
# AltStore at install time, which replaces the placeholder signature with
# the end-user's own Apple ID. The IPA contents (Mach-O binary, embedded
# MPVKit frameworks, Info.plist) are otherwise identical to what a real
# Apple Distribution build would produce. Adding real signing would
# require a $99/yr Apple Developer membership and additional secrets.

on:
  # Disabled automatic triggers to save GitHub Actions minutes.
  # Uncomment push to re-enable release builds on version tags.
  # push:
  #   tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: 'Which platform(s) to build'
        type: choice
        required: true
        default: all
        options:
          - all
          - macos
          - linux
          - linux-arm
          - windows
          - android
          - ios

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# tauri-action calls the GitHub Releases REST API to create + upload to
# the draft release. The default GITHUB_TOKEN is read-only for `contents`
# unless we explicitly grant write here.
permissions:
  contents: write

jobs:
  # Emits the filtered matrix as JSON so the `build` job only spins up
  # runners for the platforms the user actually asked for. We can't gate
  # matrix entries with a job-level `if:` because the `matrix` context
  # isn't available in job-level conditions — only `github`, `needs`,
  # `vars`, `inputs`. So we compute the matrix dynamically up front instead.
  #
  # Every platform (incl. android + ios) is a matrix entry now — the
  # build job has per-step `if: matrix.id == ...` gates so the unified
  # job can host the wildly different toolchains. Saves a separate
  # build-android job and lets ios slot in with the same plumbing.
  setup:
    name: Select platforms
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      # Workspace version, parsed from Cargo.toml. Used by android +
      # ios matrix entries to tag the release and name the artifact.
      # Desktop entries get this via tauri-action's __VERSION__
      # substitution and don't read this output.
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - id: version
        run: |
          VERSION=$(awk '/^\[workspace\.package\]/{f=1; next} f && /^version[[:space:]]*=/{gsub(/[",[:space:]]/, "", $3); print $3; exit}' Cargo.toml)
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to parse version from Cargo.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Workspace version: $VERSION"

      - id: select
        env:
          # Default to 'all' so tag-push triggers (if re-enabled) still build everything.
          PLATFORM: ${{ inputs.platform || 'all' }}
        shell: bash
        run: |
          # `id` drives per-step gating in the build job. `rust-target`
          # is empty for hosts that build for the native triple only
          # (linux x86_64, windows x86_64). `tauri-args` is passed to
          # tauri-action where applicable; android + ios call their own
          # toolchains directly and ignore it.
          #
          # macOS Universal: builds for both Apple Silicon and Intel on
          # a single arm64 runner, then `lipo`s them together into one
          # .dmg. Possible because libloading means we don't need a
          # libmpv binary for each arch at link time — only at runtime,
          # where each user's brew install provides the right one.
          macos='{"id":"macos","platform":"macos-14","label":"macOS (Universal)","rust-target":"aarch64-apple-darwin,x86_64-apple-darwin","tauri-args":"--target universal-apple-darwin"}'
          # Two separate linux entries so each arch can be dispatched
          # independently. Native arm64 runner — GitHub's
          # `ubuntu-22.04-arm` images are free for public repos and
          # billed (Larger Runner allocation) for private. Cross-
          # compiling AppImages is impractical (appimagetool + runtime
          # are arch-specific binaries the tauri bundler invokes
          # natively), so a second runner is the cleanest path. The
          # linux-only build steps below gate on
          # `startsWith(matrix.id, 'linux')` so both arches share the
          # same recipe; apt-get and ldd pick up the right arch
          # automatically when run on the matching host.
          linux='{"id":"linux","platform":"ubuntu-22.04","label":"Linux (x86_64)","rust-target":"","tauri-args":""}'
          linux_arm='{"id":"linux-arm","platform":"ubuntu-22.04-arm","label":"Linux (arm64)","rust-target":"","tauri-args":""}'
          windows='{"id":"windows","platform":"windows-latest","label":"Windows (x86_64)","rust-target":"","tauri-args":""}'
          # 64-bit ARM covers all modern phones; 32-bit ARM keeps older
          # devices working. Skipping x86 / x86_64 keeps the APK smaller
          # — emulator-only ABIs aren't worth the bloat for sideload.
          android='{"id":"android","platform":"ubuntu-22.04","label":"Android (APK)","rust-target":"aarch64-linux-android,armv7-linux-androideabi","tauri-args":""}'
          # iOS device-only (aarch64-apple-ios). Skipping the simulator
          # triple keeps the build fast — sideload distribution always
          # targets real hardware.
          #
          # Runs on macos-15, NOT macos-14: xcodegen (latest brew)
          # generates pbxproj files with objectVersion=77, which needs
          # Xcode 16+. macos-14's default Xcode is 15.4 (objectVersion
          # tops out around 56) and fails with "future Xcode project
          # file format (77)". The desktop matrix entries stay on
          # macos-14 because they build via cargo/tauri-action and
          # never open an .xcodeproj.
          ios='{"id":"ios","platform":"macos-15","label":"iOS (IPA, ad-hoc)","rust-target":"aarch64-apple-ios","tauri-args":""}'
          case "$PLATFORM" in
            all)       include="[$macos,$linux,$linux_arm,$windows,$android,$ios]" ;;
            macos)     include="[$macos]" ;;
            linux)     include="[$linux]" ;;
            linux-arm) include="[$linux_arm]" ;;
            windows)   include="[$windows]" ;;
            android)   include="[$android]" ;;
            ios)       include="[$ios]" ;;
            *) echo "Unknown platform: $PLATFORM" >&2; exit 1 ;;
          esac
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.label }}
    needs: setup
    # The setup job always emits a non-empty matrix (the workflow_dispatch
    # input is required), but the guard is cheap and protects against
    # future refactors that might emit `[]` for a no-op case.
    if: needs.setup.outputs.matrix != '{"include":[]}'
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: '. -> target'
          # Separate cache per matrix entry. Android + iOS share runner
          # OSes with desktop entries (ubuntu-22.04 / macos-14) but
          # produce different compiled artifacts, so they need their
          # own cache slots.
          key: ${{ matrix.id }}
          # Don't cache ~/.cargo/bin — see the long-form comment in
          # ci.yml. A stale cargo proxy here surfaces as
          # `cargo metadata` failing inside tauri-action with
          # "Usage: rustup-init[EXE] [OPTIONS]". tauri-cli is cached
          # separately for the android/ios matrix entries via the
          # actions/cache step further down; desktop entries get
          # tauri-cli fresh from tauri-action's `npm install -g`, so
          # there's nothing in ~/.cargo/bin worth caching here either.
          cache-bin: false

      # pnpm/action-setup must run before setup-node so `cache: pnpm`
      # can call `pnpm store path` to find the cache directory.
      - name: Install pnpm
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0  # v6.0.7
        with:
          version: 11

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          # pnpm 11.x requires Node ≥ 22.13 — it imports `node:sqlite`
          # which only exists in the Node 22 builtin set. Earlier Node
          # versions crash with ERR_UNKNOWN_BUILTIN_MODULE at
          # `pnpm store path` (which setup-node invokes when
          # `cache: pnpm` is set).
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      # ── Linux ──────────────────────────────────────────────────────
      # Tauri's webkit2gtk + libmpv for playback. patchelf is needed
      # both by tauri's AppImage bundler and by our self-contained libmpv
      # script (sets RPATH=$ORIGIN on each bundled lib).
      # libayatana-appindicator3-dev is the maintained replacement for
      # the deprecated libappindicator3-dev package.
      - name: Install Linux system dependencies
        if: startsWith(matrix.id, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            libmpv-dev \
            build-essential \
            curl \
            wget \
            file

      # Walk libmpv.so.2's transitive non-glibc deps via ldd, copy them to
      # ramus-tauri/linux-libs/, set RPATH=$ORIGIN on each, and write
      # tauri.linux.conf.json with bundle.linux.appimage.files mapping each
      # to /usr/lib/<basename>. Tauri picks up the platform-conf at build
      # time and adds the libs to the .AppImage. .deb / .rpm are unaffected
      # — those use the system libmpv2 / mpv-libs via the depends arrays
      # already in tauri.conf.json.
      - name: Bundle libmpv into Linux .AppImage
        if: startsWith(matrix.id, 'linux')
        run: python3 scripts/bundle-linux-libmpv.py

      # ── macOS ──────────────────────────────────────────────────────
      # brew installs libmpv plus its full ffmpeg/codec/font stack.
      # We bundle all of it into the .app a few steps below for
      # self-contained distribution — users no longer need to
      # `brew install mpv` themselves.
      - name: Install macOS system dependencies
        if: matrix.id == 'macos'
        run: brew install mpv

      # Walk libmpv's transitive dylibs, copy them to ramus-tauri/macos-frameworks/,
      # rewrite all install_names to @loader_path/<basename>, and write
      # tauri.macos.conf.json with bundle.macOS.frameworks populated. Tauri
      # auto-merges that platform-conf.json at build time and copies the
      # (already self-contained) dylibs into <app>.app/Contents/Frameworks/.
      # See scripts/bundle-macos-libmpv.py for the gory details.
      - name: Bundle libmpv into macOS .app
        if: matrix.id == 'macos'
        run: python3 scripts/bundle-macos-libmpv.py

      # ── Windows ────────────────────────────────────────────────────
      # No pkg-config, no libmpv-dev package. Download the LGPL prebuilt
      # DLL from zhongfly/mpv-winbuild and drop it where
      # tauri.windows.conf.json expects it (`ramus-tauri/windows-deps/`).
      # Tauri then bundles it as a resource so it lands next to ramus.exe
      # in the installer. `7z.exe` is preinstalled on GitHub Actions Windows runners.
      #
      # SECURITY: tag + asset + sha256 are ALL pinned. GitHub release assets
      # are mutable (the owner can delete + re-upload a file under the same
      # tag), so tag pinning alone is not enough to defeat a supply-chain
      # attack on that repo — the hash check is the real guarantee that the
      # DLL matches what we audited. If you bump MPV_RELEASE_TAG / MPV_ASSET,
      # you MUST also update MPV_ASSET_SHA256 to the new asset's SHA-256
      # (visible on the GitHub releases page or via the GitHub API, e.g.:
      #   gh api /repos/zhongfly/mpv-winbuild/releases/tags/<tag> \
      #     --jq '.assets[] | select(.name=="<asset>") | .digest'
      # which returns "sha256:<hex>").
      - name: Download libmpv DLL
        if: matrix.id == 'windows'
        shell: pwsh
        env:
          MPV_RELEASE_TAG: 2026-05-11-8674222927
          MPV_ASSET: mpv-dev-lgpl-x86_64-20260511-git-8674222927.7z
          MPV_ASSET_SHA256: 6b915ea370d2db68fae70d59970d544afd6bb736520d2dade8721853385a9254
        run: |
          $url = "https://github.com/zhongfly/mpv-winbuild/releases/download/$env:MPV_RELEASE_TAG/$env:MPV_ASSET"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile mpv-dev.7z
          $actual = (Get-FileHash mpv-dev.7z -Algorithm SHA256).Hash.ToLower()
          $expected = $env:MPV_ASSET_SHA256.ToLower()
          if ($actual -ne $expected) {
            throw "mpv-dev.7z SHA-256 mismatch: expected $expected, got $actual"
          }
          Write-Host "SHA-256 verified: $actual"
          7z x mpv-dev.7z -ompv-dev | Out-Null
          $dll = Get-ChildItem -Path mpv-dev -Recurse -Filter libmpv-2.dll | Select-Object -First 1
          if ($null -eq $dll) { throw "libmpv-2.dll not found in archive" }
          New-Item -ItemType Directory -Force -Path ramus-tauri/windows-deps | Out-Null
          Copy-Item $dll.FullName ramus-tauri/windows-deps/libmpv-2.dll
          Write-Host "Placed libmpv-2.dll ($((Get-Item ramus-tauri/windows-deps/libmpv-2.dll).Length) bytes)"

      # ── Frontend (android + ios) ───────────────────────────────────
      # tauri-action runs `pnpm install` + `pnpm run build` itself for
      # desktop entries (via beforeBuildCommand in tauri.conf.json — and
      # it autodetects the package manager from the committed lockfile),
      # but android and iOS call their toolchains directly and need
      # ui/dist/ ready before the build kicks off — the bundled assets
      # are baked into the APK/IPA at compile time.
      - name: Install frontend dependencies
        if: matrix.id == 'android' || matrix.id == 'ios'
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        if: matrix.id == 'android' || matrix.id == 'ios'
        working-directory: ui
        run: pnpm run build

      # Cache the compiled cargo-tauri binary instead of rebuilding it
      # (and its ~1500 transitive crates) on every release run. Key on
      # the exact tauri-cli version + runner OS so a version bump or a
      # platform swap forces a fresh install; otherwise restore the
      # binary directly into ~/.cargo/bin and skip the install entirely.
      # The desktop matrix entries don't need this — tauri-action
      # invokes cargo-tauri internally via the workspace `Cargo.toml`,
      # not via `cargo install`.
      - name: Cache tauri CLI binary
        if: matrix.id == 'android' || matrix.id == 'ios'
        id: cache-tauri-cli
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-2.11.1-${{ runner.os }}

      # Pin to an exact patch version (note the leading `=`; without it
      # cargo treats `2.11.1` as `^2.11.1` and could pick up 2.11.2 etc).
      # `--locked` makes cargo respect the Cargo.lock that ships with the
      # tauri-cli crate on crates.io, so we inherit Tauri's own dep
      # pinning for the ~1500 transitive crates rather than fresh-
      # resolving every time. Bump deliberately, not implicitly.
      - name: Install tauri CLI
        if: (matrix.id == 'android' || matrix.id == 'ios') && steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --locked --version '=2.11.1'

      # ── Android ────────────────────────────────────────────────────
      - name: Set up JDK 17
        if: matrix.id == 'android'
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b  # v4
        with:
          distribution: temurin
          java-version: '17'

      # Decode the keystore from a base64 secret rather than committing it.
      # Two failure modes worth catching loudly: secret unset (zero bytes
      # in env), or wrong base64 encoding (decoded file empty).
      - name: Decode Android signing keystore
        if: matrix.id == 'android'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set."
            echo "See the comment block at the top of this workflow file for setup."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > ramus-tauri/gen/android/app/release.keystore
          if [ ! -s ramus-tauri/gen/android/app/release.keystore ]; then
            echo "::error::Decoded keystore is empty — check the base64 encoding."
            exit 1
          fi
          echo "Keystore decoded ($(stat -c%s ramus-tauri/gen/android/app/release.keystore) bytes)"

      # build.gradle.kts reads these via java.util.Properties.load — no
      # shell escaping concerns. Don't echo the values.
      - name: Write Android signing.properties
        if: matrix.id == 'android'
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::One or more signing secrets are unset. See workflow header."
            exit 1
          fi
          {
            echo "storeFile=release.keystore"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > ramus-tauri/gen/android/app/signing.properties

      # `--apk` produces a sideloadable .apk (vs the default .aab which is
      # only useful for Play Store). cargo-tauri auto-generates
      # tauri.properties (versionCode/versionName) from Cargo.toml, so we
      # don't need to maintain that file.
      - name: Build signed Android release APK
        if: matrix.id == 'android'
        working-directory: ramus-tauri
        run: cargo tauri android build --apk

      # `cargo tauri android build` outputs to a known directory but the
      # exact filename includes the ABI / build variant — glob it.
      - name: Locate APK
        if: matrix.id == 'android'
        id: apk
        run: |
          APK=$(find ramus-tauri/gen/android/app/build/outputs/apk -name "*-release.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No release APK found under build/outputs/apk"
            find ramus-tauri/gen/android/app/build/outputs -type f
            exit 1
          fi
          ls -la "$APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      # ── iOS ────────────────────────────────────────────────────────
      # xcodegen generates the .xcodeproj from project.yml. CocoaPods is
      # not used — the plugin's Swift sources are wired in via SPM (see
      # plugins/tauri-plugin-ramus-ios-bridge/ios/Package.swift) and
      # MPVKit is declared as an SPM package in gen/apple/project.yml.
      # macos-14 runners ship Xcode + the iOS SDK; only xcodegen needs
      # installing.
      - name: Install xcodegen
        if: matrix.id == 'ios'
        run: brew install xcodegen

      # ramus-tauri/gen/apple/project.yml declares a preBuildScript that
      # calls `cargo tauri ios xcode-script`. That subcommand expects to
      # connect to a parent `cargo tauri ios build` process over a local
      # WebSocket (the addr is published in $TMPDIR/<bundle-id>-server-
      # addr by the parent) to fetch CliOptions via RPC. In CI there is
      # no parent, so xcode-script panics with "failed to read missing
      # addr file ...". Building Rust ourselves here, then patching the
      # preBuildScript to just verify the artefact, bypasses the RPC
      # handshake entirely. The patch only touches the working-tree
      # copy of project.yml — local `cargo tauri ios dev` is untouched.
      - name: Pre-build libapp.a for iOS (sidesteps tauri xcode-script RPC)
        if: matrix.id == 'ios'
        run: |
          set -euo pipefail
          cargo build --target aarch64-apple-ios --release -p ramus-tauri --lib
          # Place libapp.a in BOTH Release and Debug slots. Xcode 16
          # sometimes links Debug variants as part of a Release build
          # (debug-symbols bundle, mergeable-libs pre-pass, scheme
          # implicit deps — exact trigger varies by Xcode point
          # release). The Rust staticlib is the same in either slot;
          # the cost is one extra cp. Mirrors build-ios-ipa-local.sh.
          for CONFIG in Release Debug; do
            DEST_DIR="ramus-tauri/gen/apple/Externals/arm64/$CONFIG"
            mkdir -p "$DEST_DIR"
            cp target/aarch64-apple-ios/release/libramus_tauri.a "$DEST_DIR/libapp.a"
          done
          ls -la ramus-tauri/gen/apple/Externals/arm64/*/libapp.a

      - name: Drop tauri xcode-script preBuildScript (CI-only)
        if: matrix.id == 'ios'
        # Ruby is preinstalled on macos-15 runners and its stdlib
        # includes `psych` (YAML); python3 is also there but PyYAML
        # is NOT preinstalled, and pip-installing it just to mutate
        # one YAML file is more overhead than this is worth.
        #
        # Earlier iteration tried to replace the script with a
        # "verify libapp.a exists" stub, but Xcode also invokes
        # preBuildScripts during pre-build/indexing passes where
        # ARCHS / CONFIGURATION aren't populated (env shows
        # `arch=undefined_arch`), and the verify falsely tripped
        # there. Since the workflow's earlier step already places
        # libapp.a at the path xcodegen's outputFiles spec points
        # the linker at, the script is doing no useful work for us
        # — drop it entirely. The link step itself will surface a
        # clear "library not found" error if libapp.a is missing.
        run: |
          set -euo pipefail
          ruby <<'RB'
          require 'yaml'
          path = 'ramus-tauri/gen/apple/project.yml'
          d = YAML.load_file(path)
          d['targets']['ramus-tauri_iOS'].delete('preBuildScripts')
          File.write(path, d.to_yaml)
          puts "project.yml: preBuildScripts removed from ramus-tauri_iOS target"
          RB

      - name: Regenerate iOS Xcode project
        if: matrix.id == 'ios'
        run: ./scripts/regen-ios-project.sh

      # Build an ad-hoc-signed .app and pack it into a structurally valid
      # .ipa, with NO Apple Developer credentials required.
      #
      # CODE_SIGN_IDENTITY="-" signs each Mach-O with the ad-hoc identity
      # (sha-only, no certificate). The resulting .ipa is NOT directly
      # installable on a real device — Apple's installd rejects ad-hoc
      # signatures. The flow is: SideStore / AltStore strip the
      # placeholder signature on install and re-sign with the end-user's
      # own Apple ID. The IPA contents (Mach-O binary, embedded MPVKit
      # xcframeworks, Info.plist, asset catalog) are otherwise identical
      # to what an Apple Distribution build would produce.
      #
      # We bypass `cargo tauri ios build` here because the tauri CLI
      # assumes a real DEVELOPMENT_TEAM is configured and tries to invoke
      # `xcodebuild -exportArchive` with an ExportOptions.plist demanding
      # a provisioning profile. Calling xcodebuild directly lets us pass
      # the ad-hoc signing flags; the cargo build for libapp.a is still
      # triggered by the preBuildScript in gen/apple/project.yml, which
      # runs `cargo tauri ios xcode-script`.
      #
      # CODE_SIGNING_ALLOWED=YES + CODE_SIGN_STYLE=Manual is the
      # combination that lets Xcode sign without trying to auto-fetch a
      # provisioning profile from the Developer Portal. Empty
      # PROVISIONING_PROFILE_SPECIFIER + DEVELOPMENT_TEAM make that
      # explicit so future Xcode versions don't change behavior on us.
      - name: Build iOS .ipa (ad-hoc signed)
        if: matrix.id == 'ios'
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          set -euo pipefail
          cd ramus-tauri/gen/apple

          # iOS 17+ SDKs reject CODE_SIGN_IDENTITY="-" during
          # `xcodebuild archive` with: "Ad Hoc code signing is not
          # allowed with SDK 'iOS 18.5'". Apple closed the path that
          # let an unprivileged ad-hoc identity claim a real signing
          # slot at archive time. Two-phase workaround:
          #
          #   1. `xcodebuild build` (NOT archive) with code signing
          #      fully disabled. Produces an unsigned .app inside
          #      DerivedData. `archive` requires a signed product;
          #      `build` is happy with no signature.
          #   2. Ad-hoc sign the unsigned .app + every embedded
          #      framework ourselves with `codesign -s -`. SideStore
          #      strips and re-signs at install time, so the ad-hoc
          #      signature only needs to satisfy the IPA structural
          #      requirement (codesign-checked at install on the
          #      device side, regardless of who eventually signs it).
          # ENABLE_DEBUG_DYLIB=NO disables Xcode 16's per-app debug
          # dylib build (a separate <app>.debug.dylib that ships next
          # to the main binary for SwiftUI Previews / hot-swap
          # iteration). It builds in a Debug context even under
          # `-configuration Release`, so it tries to link libapp.a
          # from Externals/arm64/Debug/ — but we only pre-built and
          # placed the Release variant. Disabling the debug dylib
          # cuts the whole second link step; we don't ship previews
          # in distributed builds so there's nothing to lose.
          DERIVED_DATA="$PWD/build/DerivedData"
          xcodebuild build \
            -project ramus-tauri.xcodeproj \
            -scheme ramus-tauri_iOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            ENABLE_DEBUG_DYLIB=NO

          # Xcode 16 + xcodegen scheme combo doesn't always honour
          # `-configuration Release` — the .app sometimes lands in
          # `debug-iphoneos/` instead. The cargo-built libapp.a is the
          # release-optimised variant either way, so a "debug-built"
          # outer .app still produces a usable IPA — just with a
          # larger main binary. Look in both spellings and warn if we
          # picked the non-Release variant. Match build-ios-ipa-local.sh.
          UNSIGNED_APP=""
          ACTUAL_CFG=""
          for CFG_DIR in "Release-iphoneos" "release-iphoneos" "Debug-iphoneos" "debug-iphoneos"; do
            CANDIDATE="$DERIVED_DATA/Build/Products/$CFG_DIR/ramus.app"
            if [ -d "$CANDIDATE" ]; then
              UNSIGNED_APP="$CANDIDATE"
              ACTUAL_CFG="$CFG_DIR"
              break
            fi
          done
          if [ -z "$UNSIGNED_APP" ]; then
            echo "::error::No .app found under $DERIVED_DATA/Build/Products"
            find "$DERIVED_DATA/Build/Products" -maxdepth 3 -name "*.app" 2>/dev/null || true
            exit 1
          fi
          if [[ "$ACTUAL_CFG" != Release-* && "$ACTUAL_CFG" != release-* ]]; then
            echo "::warning::Xcode produced $ACTUAL_CFG instead of Release — IPA will install fine but the main binary is debug-config (TODO: figure out why -configuration Release is being silently dropped)"
          fi
          echo "Using app from $ACTUAL_CFG/"

          # Pack into IPA layout (Payload/ramus.app at root of the zip).
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$UNSIGNED_APP" build/Payload/

          # Re-sign embedded frameworks first (deepest-first via -depth,
          # which on BSD find is identical to -d / global post-order
          # traversal) then the .app itself. `codesign --deep` is
          # deprecated by Apple and skips nested bundles inconsistently
          # — walking the framework set ourselves is more reliable.
          # Order matters: the outer .app signature must seal over its
          # dependencies' fresh signatures.
          find build/Payload/ramus.app/Frameworks -name "*.framework" -depth -exec codesign --force --sign - --timestamp=none {} \;
          codesign --force --sign - --timestamp=none build/Payload/ramus.app

          cd build
          zip -rqy "ramus_${VERSION}_ios-adhoc.ipa" Payload
          ls -la "ramus_${VERSION}_ios-adhoc.ipa"

      - name: Locate IPA
        if: matrix.id == 'ios'
        id: ipa
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          IPA="ramus-tauri/gen/apple/build/ramus_${VERSION}_ios-adhoc.ipa"
          if [ ! -f "$IPA" ]; then
            echo "::error::Expected IPA at $IPA but it does not exist"
            exit 1
          fi
          echo "path=$IPA" >> "$GITHUB_OUTPUT"

      # ── Desktop publish (tauri-action) ─────────────────────────────
      # tauri-action handles the build, beforeBuildCommand (vite build),
      # bundling, AND draft-release creation/upload in one step. Android
      # and iOS bypass it entirely because they need custom toolchains
      # and produce artifacts (.apk / .ipa) that tauri-action doesn't
      # know how to bundle from cargo metadata alone.
      - name: Build and publish desktop artifacts (tauri-action)
        if: matrix.id == 'macos' || startsWith(matrix.id, 'linux') || matrix.id == 'windows'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ramus-tauri
          tagName: v__VERSION__
          releaseName: 'ramus v__VERSION__'
          releaseBody: |
            ### Available Binaries:

            - **macOS (Universal)** - `*_universal.dmg` (works on Intel + Apple Silicon)
            - **Linux (x86_64)** - `*_amd64.AppImage` / `*_amd64.deb` / `*.x86_64.rpm`
            - **Linux (arm64)** - `*_aarch64.AppImage` / `*_arm64.deb` / `*.aarch64.rpm`
            - **Windows** - `*_x64-setup.exe` (NSIS) or `*_x64_en-US.msi` (MSI).
            - **Android** - `.apk` (sideload).
            - **iOS (iPhone)** - `*_ios-adhoc.ipa` (sideload)

            ### Installation note:
            These builds are **unsigned**, so you'll get a warning the first time you open the app:

            - **macOS**: right-click the app > Open, then if it tells you it's damaged (thanks MacOS), go to System Settings > Privacy & Security > Scroll Down > Run Anyway. Or run `xattr -dr com.apple.quarantine /Applications/ramus.app` from your terminal to clear the quarantine flag.
            - **Windows**: SmartScreen will show "Unknown publisher" - click "More info" > "Run anyway".
            - **Android**: enable "Install unknown apps" for your file manager / browser, then tap the .apk.
            - **iOS (iPhone Only)**: sideload however you like, or use sidestore source `https://1337raspberry.github.io/ramus.json` to grab this automatically.

            Feedback very welcome.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}

      # ── Strip over-bundled host libs from the AppImage ─────────────
      # tauri-action runs linuxdeploy + linuxdeploy-plugin-gtk, which
      # bundles the host's wayland/X11/xkbcommon stack alongside GTK.
      # Those libs are version-coupled to the host compositor and
      # webkit2gtk; shipping our build-host copies breaks webkit's
      # EGL init on distros newer than Ubuntu 22.04 (Fedora 42 aborts
      # with EGL_BAD_PARAMETER and renders an invisible window).
      # bundle.linux.appimage.files is additive — we can't un-bundle
      # via Tauri config — so strip them after the fact, then re-upload
      # to the draft release with --clobber to replace the asset
      # tauri-action just put there. See scripts/strip-appimage.py for
      # the full rationale and the soname-prefix exclude list.
      - name: Strip over-bundled host libs from AppImage and re-upload
        if: startsWith(matrix.id, 'linux')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          python3 scripts/strip-appimage.py
          APPIMAGE=$(ls ramus-tauri/target/release/bundle/appimage/*.AppImage)
          gh release upload "v${VERSION}" "$APPIMAGE" --clobber
          echo "Re-uploaded stripped: $APPIMAGE"

      # ── Sideload artifact upload (android + ios) ───────────────────
      # When desktop matrix entries ran, tauri-action created the draft.
      # When this is the only matrix entry, no draft exists yet — fall
      # back to creating it. `gh release view` checks for an existing
      # draft by tag; we only create if absent. Concurrent matrix runs
      # are safe: the first one to `gh release create` wins, others see
      # the draft already there. `--clobber` on upload lets re-runs
      # overwrite a previously uploaded asset without manual cleanup.
      - name: Upload sideload artifact to draft release
        if: matrix.id == 'android' || matrix.id == 'ios'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.version }}
          APK_PATH: ${{ steps.apk.outputs.path }}
          IPA_PATH: ${{ steps.ipa.outputs.path }}
          MATRIX_ID: ${{ matrix.id }}
        run: |
          set -euo pipefail
          TAG="v$VERSION"
          # TOCTOU: android + ios + tauri-action can all hit the
          # "create draft if absent" path concurrently when no prior
          # run has created v$VERSION. The window between the view
          # check and the create call is wide enough that two runners
          # can both see "doesn't exist" and both try to create. Under
          # `set -e` the loser exits non-zero and fails the job.
          # `|| gh release view "$TAG"` recovers: if another runner
          # won the race, the release now exists and view returns 0;
          # if it still doesn't exist, the original create error is
          # the real problem and the view will also fail, propagating.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --draft \
              --title "ramus $TAG" \
              --notes "Automated build. See platform-specific install notes in the release description once the desktop matrix populates it." \
              || gh release view "$TAG" >/dev/null 2>&1
          fi
          if [ "$MATRIX_ID" = "android" ]; then
            DEST="ramus_${VERSION}_universal.apk"
            cp "$APK_PATH" "$DEST"
          else
            DEST="ramus_${VERSION}_ios-adhoc.ipa"
            cp "$IPA_PATH" "$DEST"
          fi
          gh release upload "$TAG" "$DEST" --clobber
          echo "Uploaded $DEST to $TAG"
