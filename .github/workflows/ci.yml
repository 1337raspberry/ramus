name: CI

# Lightweight checks on every push + PR so we notice breakage before
# tagging a release. Runs the Rust unit tests + clippy + the frontend
# build on macOS and Linux. No bundling — the Release workflow handles
# installer artifacts.

on:
  push:
    branches: [main]
    # Skip CI for docs-only changes — none of these affect build/test.
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - 'licenses/**'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - 'licenses/**'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege by default: this workflow only needs to read the repo.
# Explicitly denying everything else means a future step (or a compromised
# third-party action) can't silently use secrets.GITHUB_TOKEN to write.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            label: macOS
          - platform: ubuntu-22.04
            label: Linux

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: '. -> target'
          key: ci-${{ matrix.platform }}
          # Only write cache entries from main-branch runs so fork PRs
          # can't poison a key that a later release build consumes.
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # Don't cache ~/.cargo/bin. Once it's stale (e.g. a runner
          # image rolls and the old cargo proxy no longer matches the
          # new rustup), every subsequent run restores broken binaries
          # and `cargo <anything>` errors as `rustup-init`. Nothing in
          # this job runs `cargo install` for a binary worth caching;
          # tauri-cli / cargo-about are cached via dedicated
          # actions/cache entries keyed on exact version.
          cache-bin: false

      # Linux: tauri's transitive sys crates (webkit2gtk-sys, soup3-sys,
      # javascriptcore-sys) probe pkg-config in their build scripts even
      # for `cargo clippy`. macOS uses native WKWebView so no system deps.
      # libmpv is NOT needed at build time — runtime only via libloading.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      # pnpm/action-setup MUST run before setup-node when using
      # `cache: pnpm` — setup-node shells out to `pnpm store path` to
      # locate the cache directory, so pnpm has to exist on PATH first.
      - name: Install pnpm
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0  # v6.0.7
        with:
          version: 11

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      # tauri-build reads `frontendDist` from tauri.conf.json and expects
      # the directory to exist, so the frontend must be built before any
      # cargo command that touches ramus-tauri.
      - name: Build frontend
        working-directory: ui
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: cargo test (ramus-core)
        run: cargo test -p ramus-core --all-features

      # Workspace-wide so warnings in ramus-tauri can't slip past CI.
      # `--all-targets` covers test code, which is where most of the
      # session's actual lint failures lived.
      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install pnpm
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0  # v6.0.7
        with:
          version: 11

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      # vite build runs tsc internally, but a standalone --noEmit pass
      # surfaces type errors without paying for the bundling step and
      # lets the failure name something other than "vite build failed".
      - name: TypeScript check
        working-directory: ui
        run: pnpm exec tsc --noEmit

      - name: Build frontend
        working-directory: ui
        run: pnpm run build

  # Runs cargo-deny against the committed Cargo.lock. Stricter
  # superset of `cargo audit`: also enforces source allowlist
  # (crates.io only — no surprise git deps), license policy (mirrors
  # config/about.toml), and surfaces duplicate-version warnings. Triaged
  # advisories live in the `ignore` array in /config/deny.toml — each entry
  # has a comment explaining why we tolerate it; review on bump.
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      # `--locked` makes cargo respect the lockfile shipped with the
      # cargo-deny crate on crates.io — same supply-chain rationale
      # as the tauri-cli install in release.yml. Pinning the version
      # range so a fresh major bump (e.g. 0.20 with breaking config
      # changes) doesn't silently break CI.
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version '^0.19'

      - name: cargo deny check
        run: cargo deny --manifest-path Cargo.toml check --config config/deny.toml

  # Regenerates THIRD_PARTY_LICENSES.md from the current Cargo.lock +
  # ui/pnpm-lock.yaml and surfaces drift as an advisory annotation.
  # NOT a hard gate — cargo-about's license-text trimming is non-byte-
  # deterministic across platforms (mac vs linux runner produce slightly
  # different whitespace inside license bodies), and gating every push
  # on that wasn't worth the friction. Real value is the visible diff
  # in CI logs at release time so we know to regen before tagging.
  # Does not consume user-supplied event inputs, so no injection risk;
  # only github.ref is referenced and that's a safe built-in context.
  licenses:
    name: Third-party licenses drift check
    runs-on: ubuntu-22.04
    # Run after the primary build jobs so dependency-tree or build
    # failures surface first; avoids the drift check flapping on a
    # cascade of "clippy broke and so did the license list" errors in
    # the same PR.
    needs: [rust, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Need history to diff PR changes against the base ref in the
          # detect step below. Full history is the simplest reliable
          # option; the job is otherwise small enough that the extra
          # fetch cost is in the noise.
          fetch-depth: 0

      # Skip the rest of the job on PRs that can't possibly affect the
      # generated licenses doc. Cargo.lock + pnpm-lock.yaml are committed
      # and CI uses frozen installs, so attribution only drifts when one
      # of these inputs changes:
      #   - Cargo.lock                              (added/removed/bumped Rust crates)
      #   - ui/pnpm-lock.yaml                       (added/removed/bumped JS packages)
      #   - config/about.toml                       (license policy / accept list)
      #   - scripts/generate-third-party-licenses.py (renderer behaviour)
      #   - THIRD_PARTY_LICENSES.md / licenses/…    (someone touched the output directly)
      # Non-PR events (push to main, manual dispatch) always run — we
      # want main builds to keep verifying, and manual dispatch is the
      # whole point of an on-demand check. Trigger inputs are passed via
      # env (github.event_name is an enumerated string; base.sha is a
      # git SHA from GitHub, not attacker-influenceable text), and both
      # are quoted in shell — no injection surface.
      - name: Detect dependency-affecting changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Non-PR event ($EVENT_NAME) — running."
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD)
          echo "Changed files in this PR:"
          echo "$CHANGED"
          echo "------------------------------------------------------------"
          if echo "$CHANGED" | grep -qE '^(Cargo\.lock|ui/pnpm-lock\.yaml|config/about\.toml|scripts/generate-third-party-licenses\.py|THIRD_PARTY_LICENSES\.md|licenses/THIRD_PARTY_LICENSES\.md)$'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Dependency-affecting paths changed — running drift check."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No dependency-affecting paths changed — skipping drift check."
          fi

      - name: Install Rust toolchain
        if: steps.changes.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      # Cache the cargo registry/source so the `cargo fetch` step further
      # down is a no-op on cache hits. The cargo-about *binary* itself is
      # cached separately below — they're independent: binary cache
      # avoids rebuilding the tool, registry cache avoids re-downloading
      # our workspace's dep sources for cargo-about to scan.
      - name: Rust cache (registry/source)
        if: steps.changes.outputs.run == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: '. -> target'
          key: ci-licenses
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # ~/.cargo/bin caching disabled — see comment on the matrix
          # rust-cache step above. cargo-about is the only installed
          # binary here and it has its own dedicated cache entry below.
          cache-bin: false

      # Cache the compiled cargo-about binary instead of `cargo install`-ing
      # it (and its transitive crates) on every run — same pattern as
      # tauri-cli in release.yml. Key on exact version + runner OS so a
      # bump or platform swap forces a fresh build; otherwise restore the
      # binary straight into ~/.cargo/bin.
      - name: Cache cargo-about binary
        if: steps.changes.outputs.run == 'true'
        id: cache-cargo-about
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cargo/bin/cargo-about
          key: cargo-about-0.6.6-${{ runner.os }}

      - name: Install cargo-about
        if: steps.changes.outputs.run == 'true' && steps.cache-cargo-about.outputs.cache-hit != 'true'
        run: cargo install cargo-about --locked --version '=0.6.6'

      - name: Install pnpm
        if: steps.changes.outputs.run == 'true'
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0  # v6.0.7
        with:
          version: 11

      - name: Install Node.js
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        if: steps.changes.outputs.run == 'true'
        working-directory: ui
        run: pnpm install --frozen-lockfile

      # Populate the registry index so the next step's `cargo about
      # generate --frozen` (= --locked --offline) can resolve every crate
      # in Cargo.lock without hitting the network. Without this priming
      # step the licenses job fails on a fresh runner with
      # "no matching package named X found, location searched: crates.io
      # index" — the rust job above primes its own cache under a
      # different key, so this job needs its own fetch.
      - name: Prime cargo registry
        if: steps.changes.outputs.run == 'true'
        run: cargo fetch --locked

      - name: Regenerate THIRD_PARTY_LICENSES.md
        if: steps.changes.outputs.run == 'true'
        run: python3 scripts/generate-third-party-licenses.py

      # Advisory only — cargo-about's license-text trimming behaves
      # slightly differently across platforms (extra blank lines inside
      # license bodies), and pinning that down purely for byte-identical
      # output isn't worth gating every push on. We still surface the
      # diff as a CI annotation so a real dep change (new/removed crate,
      # version bump altering the canonical list) is visible at a
      # glance, and we regen + commit at release time. continue-on-error
      # keeps the job green either way.
      - name: Show THIRD_PARTY_LICENSES.md drift (advisory)
        if: steps.changes.outputs.run == 'true'
        continue-on-error: true
        run: |
          if git diff --exit-code THIRD_PARTY_LICENSES.md licenses/THIRD_PARTY_LICENSES.md; then
            echo "THIRD_PARTY_LICENSES.md is in sync with dependencies."
            exit 0
          fi
          echo "::warning::THIRD_PARTY_LICENSES.md drift detected (advisory only)"
          echo ""
          echo "============================================================"
          echo "  THIRD_PARTY_LICENSES.md drift (advisory)"
          echo "============================================================"
          echo ""
          echo "The regenerated file differs from what's committed. This"
          echo "is often cosmetic (cargo-about whitespace differences"
          echo "between Linux/macOS) and does NOT fail the build. But if"
          echo "the diff includes new/removed crates or version bumps in"
          echo "the canonical list, regen + commit before the next release"
          echo "to keep the in-app Acknowledgements panel accurate:"
          echo ""
          echo "  python3 scripts/generate-third-party-licenses.py"
          echo "  git add THIRD_PARTY_LICENSES.md licenses/THIRD_PARTY_LICENSES.md"
          echo "  git commit -m 'regen third-party licenses'"
          echo ""
          echo "Diff CI computed:"
          echo "------------------------------------------------------------"
          git diff THIRD_PARTY_LICENSES.md licenses/THIRD_PARTY_LICENSES.md | head -200
          echo "------------------------------------------------------------"
          exit 1
