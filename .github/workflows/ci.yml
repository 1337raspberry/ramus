name: CI

# Lightweight checks on every push + PR so we notice breakage before
# tagging a release. Runs the Rust unit tests + clippy + the frontend
# build on macOS and Linux. No bundling — the Release workflow handles
# installer artifacts.

on:
  push:
    branches: [main]
    # Skip CI for docs-only changes — none of these affect build/test.
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - 'licenses/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - 'licenses/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege by default: this workflow only needs to read the repo.
# Explicitly denying everything else means a future step (or a compromised
# third-party action) can't silently use secrets.GITHUB_TOKEN to write.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            label: macOS
          - platform: ubuntu-22.04
            label: Linux

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: '. -> target'
          key: ci-${{ matrix.platform }}
          # Only write cache entries from main-branch runs so fork PRs
          # can't poison a key that a later release build consumes.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Linux: tauri's transitive sys crates (webkit2gtk-sys, soup3-sys,
      # javascriptcore-sys) probe pkg-config in their build scripts even
      # for `cargo clippy`. macOS uses native WKWebView so no system deps.
      # libmpv is NOT needed at build time — runtime only via libloading.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # tauri-build reads `frontendDist` from tauri.conf.json and expects
      # the directory to exist, so the frontend must be built before any
      # cargo command that touches ramus-tauri.
      - name: Build frontend
        working-directory: ui
        run: npm ci && npm run build

      - name: cargo test (ramus-core)
        run: cargo test -p ramus-core --all-features

      # Workspace-wide so warnings in ramus-tauri can't slip past CI.
      # `--all-targets` covers test code, which is where most of the
      # session's actual lint failures lived.
      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      # vite build runs tsc internally, but a standalone --noEmit pass
      # surfaces type errors without paying for the bundling step and
      # lets the failure name something other than "vite build failed".
      - name: TypeScript check
        working-directory: ui
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: ui
        run: npm run build

  # Runs cargo audit against the committed Cargo.lock. Same
  # workflow_dispatch trigger as the other jobs so it doesn't burn
  # GitHub Actions minutes; run manually before a release to confirm
  # no transitive RUSTSEC advisories have appeared since the last
  # audit.
  audit:
    name: Cargo audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

  # Regenerates THIRD_PARTY_LICENSES.md from the current Cargo.lock +
  # ui/package-lock.json and fails if the committed copy is stale. Keeps
  # the in-app Acknowledgements panel honest when deps change. See
  # scripts/generate-third-party-licenses.py — must stay deterministic
  # or this job flaps. Does not consume user-supplied event inputs, so
  # no injection risk; only github.ref is referenced and that's a safe
  # built-in context.
  licenses:
    name: Third-party licenses drift check
    runs-on: ubuntu-22.04
    # Run after the primary build jobs so dependency-tree or build
    # failures surface first; avoids the drift check flapping on a
    # cascade of "clippy broke and so did the license list" errors in
    # the same PR.
    needs: [rust, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Rust cache (cargo-about install)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: '. -> target'
          key: ci-licenses
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Install cargo-about
        run: cargo install cargo-about --locked --version '^0.6'

      # Populate the registry index so the next step's `cargo about
      # generate --frozen` (= --locked --offline) can resolve every crate
      # in Cargo.lock without hitting the network. Without this priming
      # step the licenses job fails on a fresh runner with
      # "no matching package named X found, location searched: crates.io
      # index" — the rust job above primes its own cache under a
      # different key, so this job needs its own fetch.
      - name: Prime cargo registry
        run: cargo fetch --locked

      - name: Regenerate THIRD_PARTY_LICENSES.md
        run: python3 scripts/generate-third-party-licenses.py

      - name: Fail if THIRD_PARTY_LICENSES.md is stale
        run: |
          if git diff --exit-code THIRD_PARTY_LICENSES.md licenses/THIRD_PARTY_LICENSES.md; then
            echo "THIRD_PARTY_LICENSES.md is in sync with dependencies."
            exit 0
          fi
          echo "::error::THIRD_PARTY_LICENSES.md is out of date"
          echo ""
          echo "============================================================"
          echo "  THIRD_PARTY_LICENSES.md is out of date"
          echo "============================================================"
          echo ""
          echo "Your dependency changes altered the third-party license list."
          echo "This file must stay in sync with Cargo.lock and"
          echo "ui/package-lock.json so the bundled 'Acknowledgements' panel"
          echo "shows accurate attribution; LGPL and MPL distribution"
          echo "require it."
          echo ""
          echo "To fix (locally):"
          echo ""
          echo "  1. cd /path/to/ramus"
          echo "  2. cargo install cargo-about --locked --version '^0.6'  # if not installed"
          echo "  3. python3 scripts/generate-third-party-licenses.py"
          echo "  4. git add THIRD_PARTY_LICENSES.md licenses/THIRD_PARTY_LICENSES.md"
          echo "  5. git commit -m 'regen third-party licenses'"
          echo "  6. git push"
          echo ""
          echo "If you did NOT intentionally change dependencies, check"
          echo "whether Cargo.lock or ui/package-lock.json drifted; those"
          echo "need re-committing too."
          echo ""
          echo "Diff CI computed:"
          echo "------------------------------------------------------------"
          git diff THIRD_PARTY_LICENSES.md licenses/THIRD_PARTY_LICENSES.md | head -200
          echo "------------------------------------------------------------"
          exit 1
