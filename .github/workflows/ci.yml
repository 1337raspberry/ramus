name: CI

# Lightweight checks on every push + PR so we notice breakage before
# tagging a release. Runs the Rust unit tests + clippy + the frontend
# build on macOS and Linux. No bundling — the Release workflow handles
# installer artifacts.

on:
  # Disabled automatic triggers to save GitHub Actions minutes.
  # Uncomment push/pull_request to re-enable.
  # push:
  #   branches: [main]
  # pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege by default: this workflow only needs to read the repo.
# Explicitly denying everything else means a future step (or a compromised
# third-party action) can't silently use secrets.GITHUB_TOKEN to write.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            label: macOS
          - platform: ubuntu-22.04
            label: Linux

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: '. -> target'
          key: ci-${{ matrix.platform }}
          # Only write cache entries from main-branch runs so fork PRs
          # can't poison a key that a later release build consumes.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Linux: tauri's transitive sys crates (webkit2gtk-sys, soup3-sys,
      # javascriptcore-sys) probe pkg-config in their build scripts even
      # for `cargo clippy`. macOS uses native WKWebView so no system deps.
      # libmpv is NOT needed at build time — runtime only via libloading.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # tauri-build reads `frontendDist` from tauri.conf.json and expects
      # the directory to exist, so the frontend must be built before any
      # cargo command that touches ramus-tauri.
      - name: Build frontend
        working-directory: ui
        run: npm ci && npm run build

      - name: cargo test (ramus-core)
        run: cargo test -p ramus-core --all-features

      # Workspace-wide so warnings in ramus-tauri can't slip past CI.
      # `--all-targets` covers test code, which is where most of the
      # session's actual lint failures lived.
      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build frontend
        working-directory: ui
        run: npm run build
