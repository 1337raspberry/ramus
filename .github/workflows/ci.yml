name: CI

# Lightweight checks on every push + PR so we notice breakage before
# tagging a release. Runs the Rust unit tests + clippy + the frontend
# build on macOS and Linux. No bundling — the Release workflow handles
# installer artifacts.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            label: macOS
          - platform: ubuntu-22.04
            label: Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: ci-${{ matrix.platform }}

      # Linux: tauri's transitive sys crates (webkit2gtk-sys, soup3-sys,
      # javascriptcore-sys) probe pkg-config in their build scripts even
      # for `cargo clippy`. macOS uses native WKWebView so no system deps.
      # libmpv is NOT needed at build time — runtime only via libloading.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # tauri-build reads `frontendDist` from tauri.conf.json and expects
      # the directory to exist, so the frontend must be built before any
      # cargo command that touches ramus-tauri.
      - name: Build frontend
        working-directory: ui
        run: npm ci && npm run build

      - name: cargo test (ramus-core)
        run: cargo test -p ramus-core --all-features

      # Workspace-wide so warnings in ramus-tauri can't slip past CI.
      # `--all-targets` covers test code, which is where most of the
      # session's actual lint failures lived.
      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build frontend
        working-directory: ui
        run: npm run build
