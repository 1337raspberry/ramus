name: Release (Android APK)

# Builds a signed release APK for sideloading. Manual trigger only — no
# tag-push trigger so this never fires accidentally. Uploads to the same
# draft GitHub Release as the desktop Release workflow (creates the
# draft if it doesn't already exist for this version).
#
# REQUIRED SECRETS — set once in repo Settings → Secrets and variables → Actions:
#
#   ANDROID_KEYSTORE_BASE64    base64-encoded contents of release.keystore.
#                              Generate with:
#                                base64 -i ramus-tauri/gen/android/app/release.keystore
#                              and paste the whole string.
#   ANDROID_KEYSTORE_PASSWORD  store password (matches the local keystore;
#                              default for the dev keystore is "ramusdev").
#   ANDROID_KEY_ALIAS          key alias inside the keystore ("ramus").
#   ANDROID_KEY_PASSWORD       key password ("ramusdev").
#
# Reusing the local dev keystore is fine for sideload-only distribution.
# If we ever ship to Play Store, generate a fresh upload key and rotate
# all four secrets — the keystore identity is forever after that point
# (no signature reset on Play Store apps).

on:
  workflow_dispatch:

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

# Need write access to upload assets to the draft release.
permissions:
  contents: write

jobs:
  build:
    name: Android APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Pull the workspace version out of Cargo.toml so we can tag the
      # release and name the artifact. Single source of truth — same
      # value tauri-action substitutes for `__VERSION__` on desktop.
      - name: Resolve workspace version
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to parse version from Cargo.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Android APK for v$VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b  # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          # 64-bit ARM covers all modern phones; 32-bit ARM keeps older
          # devices working. Skipping x86 / x86_64 keeps the APK smaller
          # — emulator-only ABIs aren't worth the bloat for sideload.
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: '. -> target'
          key: release-android

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      # `cargo tauri android build` reads frontendDist from tauri.conf.json
      # and bakes it into the APK's assets — has to exist before the build.
      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Install tauri CLI
        run: cargo install tauri-cli --locked --version '^2'

      # Decode the keystore from a base64 secret rather than committing it.
      # Two failure modes worth catching loudly: secret unset (zero bytes
      # in env), or wrong base64 encoding (decoded file empty).
      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set."
            echo "See the comment block at the top of this workflow file for setup."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > ramus-tauri/gen/android/app/release.keystore
          if [ ! -s ramus-tauri/gen/android/app/release.keystore ]; then
            echo "::error::Decoded keystore is empty — check the base64 encoding."
            exit 1
          fi
          echo "Keystore decoded ($(stat -c%s ramus-tauri/gen/android/app/release.keystore) bytes)"

      # build.gradle.kts reads these via java.util.Properties.load — no
      # shell escaping concerns. Don't echo the values.
      - name: Write signing.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::One or more signing secrets are unset. See workflow header."
            exit 1
          fi
          {
            echo "storeFile=release.keystore"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > ramus-tauri/gen/android/app/signing.properties

      # `--apk` produces a sideloadable .apk (vs the default .aab which is
      # only useful for Play Store). cargo-tauri auto-generates
      # tauri.properties (versionCode/versionName) from Cargo.toml, so we
      # don't need to maintain that file.
      - name: Build signed release APK
        working-directory: ramus-tauri
        run: cargo tauri android build --apk

      # `cargo tauri android build` outputs to a known directory but the
      # exact filename includes the ABI / build variant — glob it.
      - name: Locate APK
        id: apk
        run: |
          APK=$(find ramus-tauri/gen/android/app/build/outputs/apk -name "*-release.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No release APK found under build/outputs/apk"
            find ramus-tauri/gen/android/app/build/outputs -type f
            exit 1
          fi
          ls -la "$APK"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      # Reuse the desktop draft release if it exists, otherwise create one
      # so an Android-only release run still produces a draft.
      # `--clobber` lets us re-run this workflow and overwrite a previously
      # uploaded APK without manual cleanup.
      - name: Upload APK to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          APK: ${{ steps.apk.outputs.path }}
        run: |
          TAG="v$VERSION"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --draft \
              --title "ramus $TAG" \
              --notes "Automated build. Android sideload — install the .apk on a phone with 'Install unknown apps' enabled for your file manager / browser."
          fi
          DEST="ramus_${VERSION}_universal.apk"
          cp "$APK" "$DEST"
          gh release upload "$TAG" "$DEST" --clobber
          echo "Uploaded $DEST to $TAG"
