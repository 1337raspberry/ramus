# macOS linker wrapper: rustc/ld auto-adds the `linker-signed` flag to
# ad-hoc signatures. On macOS 26 that flag causes binaries running from
# untrusted locations (anything outside /Applications/) to crash with
# `CODESIGNING / Invalid Page` when they dlopen ad-hoc-signed dylibs
# from brew paths. The wrapper invokes the real linker and re-signs with
# `codesign --force --sign -`, producing a plain ad-hoc signature (flags
# 0x2 instead of 0x20002) the kernel accepts from any location.
#
# See CLAUDE.md "macOS code signing gotcha" for the full diagnosis and
# .cargo/macos-linker-wrapper.sh for the script. The linker path is
# resolved by rustc relative to cargo's cwd (the workspace root in
# normal use), so it is spelled `.cargo/macos-linker-wrapper.sh` —
# cargo's "paths are relative to the config file's parent dir" rule
# does NOT apply to the linker field. Applied to both Apple Silicon and
# Intel so Intel contributors and CI universal builds get the fix
# transparently.

[target.aarch64-apple-darwin]
linker = ".cargo/macos-linker-wrapper.sh"

[target.x86_64-apple-darwin]
linker = ".cargo/macos-linker-wrapper.sh"

# iOS cdylib link needs unresolved mpv symbols to be allowed at cargo's
# link step — `_mpv_create`/`_mpv_command`/... come from MPVKit, which is
# an Xcode-level xcframework only visible at app-link time. The staticlib
# is what Xcode actually links into the final app; the cdylib artifact
# cargo produces here is a leftover of `[lib] crate-type = [...,"cdylib",...]`
# that we keep so Android (where the linker actually needs a `.so`) stays
# happy. `-undefined dynamic_lookup` tells ld to treat missing symbols as
# runtime-resolved instead of erroring. Deprecated on modern Apple SDKs
# but still works for dylibs; revisit if a future Xcode drops it.
[target.aarch64-apple-ios]
rustflags = ["-C", "link-arg=-Wl,-undefined,dynamic_lookup"]

[target.aarch64-apple-ios-sim]
rustflags = ["-C", "link-arg=-Wl,-undefined,dynamic_lookup"]

[target.x86_64-apple-ios]
rustflags = ["-C", "link-arg=-Wl,-undefined,dynamic_lookup"]
