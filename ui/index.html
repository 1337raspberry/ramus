<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ramus</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a1a;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        -webkit-user-select: none;
        user-select: none;
      }
      [data-tauri-drag-region] {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 32px;
        -webkit-app-region: drag;
      }
      .container {
        text-align: center;
        opacity: 0.6;
      }
      h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.1em; }
      p { margin-top: 0.5rem; font-size: 0.85rem; opacity: 0.5; }
    </style>
  </head>
  <body>
    <div data-tauri-drag-region></div>
    <div class="container">
      <h1>ramus</h1>
      <p>frontend coming soon</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
