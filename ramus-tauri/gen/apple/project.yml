name: ramus-tauri
options:
  bundleIdPrefix: com.ramus.app
  deploymentTarget:
    # MPVKit's pre-built xcframeworks (Libuavs3d etc.) are compiled
    # with a 17.5 deployment target. Setting ours lower produces
    # "built for newer iOS version" linker warnings on every object
    # file. 17.5 silences them and is a safe floor for 2026.
    iOS: 17.5
fileGroups: [../../src]
configs:
  debug: debug
  release: release
# MPVKit ships libmpv + FFmpeg + libass as pre-built xcframeworks via
# SPM. The symbols are referenced from the `MpvController.swift` that
# lives inside `tauri-plugin-ramus-ios-bridge` (which ends up inside
# `libapp.a`), but Tauri doesn't forward transitive plugin SPM deps to
# the app's Xcode project — so without this declaration, the final
# app-link step fails with unresolved `_mpv_*` symbols. The plugin's
# own `ios/Package.swift` keeps its identical dependency so the Swift
# sources compile standalone too; SPM dedupes the actual resolution.
packages:
  MPVKit:
    url: https://github.com/mpvkit/MPVKit.git
    from: 0.41.0
settingGroups:
  app:
    base:
      PRODUCT_NAME: ramus
      PRODUCT_BUNDLE_IDENTIFIER: com.ramus.app
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  ramus-tauri_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
        buildPhase: none
      - path: ramus-tauri_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: ramus-tauri_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: "1.0.0"
        # audio: keeps the mpv decoder alive while the device is locked
        # or the app is backgrounded, which is how iOS knows to hand
        # control over to MPNowPlayingInfoCenter / MPRemoteCommandCenter.
        UIBackgroundModes:
          - audio
        # Plex servers advertise themselves via Bonjour on the LAN; iOS
        # requires explicit consent to talk to them even over HTTP. The
        # purpose string surfaces in the iOS permission prompt.
        NSLocalNetworkUsageDescription: ramus needs local network access to find Plex servers on your home network.
        NSBonjourServices:
          - _plex._tcp
    entitlements:
      path: ramus-tauri_iOS/ramus-tauri_iOS.entitlements
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
        ENABLE_USER_SCRIPT_SANDBOXING: false
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
      # AVFoundation / MediaPlayer are linked by the plugin's Swift
      # package; listing them again here is a no-op but makes the
      # surface explicit.
      - sdk: AVFoundation.framework
      - sdk: MediaPlayer.framework
      # Resolves `_mpv_*` symbols from `libapp.a`.
      - package: MPVKit
    preBuildScripts:
      - script: |
          . "$HOME/.cargo/env"
          cargo tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a