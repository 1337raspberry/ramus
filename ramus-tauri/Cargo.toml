[package]
name = "ramus-tauri"
version = "0.8.1"
edition = "2021"

[dependencies]
ramus-core = { path = "../ramus-core" }
tauri = { version = "2", features = ["protocol-asset"] }
tauri-build = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
log = "0.4"
env_logger = "0.11"
url = "2"
parking_lot = "0.12"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
tauri-plugin-window-state = "2"
uuid = { version = "1", features = ["v4"] }
urlencoding = "2"
rand = "0.8"
open = "5"
# libmpv is loaded at runtime (not statically linked) so the app
# compiles on any platform without headers or import libs. See
# src/mpv_ffi.rs.
libloading = "0.8"
# Pure-Rust audio decoder. Feeds decoded f32 samples into ramus-core's
# spectrum analyser so the focus visualiser gets real per-track FFT
# data. No libav linkage — cross-platform without native deps.
symphonia = { version = "0.5", default-features = false, features = [
    "flac",
    "mp3",
    "aac",
    "alac",
    "isomp4",
    "vorbis",
    "ogg",
    "wav",
    "pcm",
] }
souvlaki = "0.8"

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
# Opts the borderless NSWindow into native fullscreen
# (NSWindowCollectionBehaviorFullScreenPrimary). Without this, macOS
# refuses to let a window with `decorations: false` enter fullscreen —
# the green traffic light is dead and View > Enter Full Screen is
# disabled. objc2 is already a transitive dependency of Tauri, so this
# reuses the same version.
objc2 = "0.6"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dev-dependencies]
tempfile = "3"
